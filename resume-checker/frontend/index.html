<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简历智能评分 — AI驱动的ATS匹配分析</title>
<style>
  :root {
    --bg: #0a0c12;
    --card: #141720;
    --text: #e4e6ec;
    --muted: #7c818c;
    --accent: #5b8df5;
    --green: #34c759;
    --red: #ff4757;
    --orange: #ff9f43;
    --border: #242836;
    --input-bg: #1a1e2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 1.5rem;
  }
  .container { width: 100%; max-width: 900px; }

  /* Header */
  .header { text-align: center; margin-bottom: 1.5rem; }
  .header h1 {
    font-size: 1.6rem;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.3rem;
  }
  .header p { color: var(--muted); font-size: 0.9rem; }

  /* Activation */
  .activation-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1.2rem;
    display: flex;
    gap: 0.6rem;
    align-items: center;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }
  .activation-bar input {
    flex: 1;
    min-width: 180px;
    padding: 0.55rem 0.8rem;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .activation-bar input:focus { border-color: var(--accent); }
  .activation-bar button {
    padding: 0.55rem 1.2rem;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .activation-bar button:hover { opacity: 0.85; }
  .activation-bar .status {
    font-size: 0.8rem;
    font-weight: 600;
  }
  .activation-bar .status.active { color: var(--green); }
  .activation-bar .status.inactive { color: var(--muted); }
  .buy-link { color: var(--orange); font-size: 0.85rem; margin-left: auto; text-decoration: none; font-weight: 600; }
  .buy-link:hover { text-decoration: underline; }

  /* Main content (locked state) */
  .locked-overlay {
    position: relative;
    opacity: 0.4;
    pointer-events: none;
    filter: blur(3px);
    transition: all 0.3s;
  }
  .unlocked { opacity: 1; pointer-events: auto; filter: none; }

  /* Input area */
  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  @media (max-width: 640px) {
    body { padding: 1rem; }
    .input-row { grid-template-columns: 1fr; }
    .activation-bar { justify-content: center; }
    .buy-link { margin-left: 0; width: 100%; text-align: center; }
    .upload-box { max-height: 240px; }
  }
  .input-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 0.4rem;
    font-size: 0.9rem;
    color: var(--text);
  }
  .input-group textarea {
    width: 100%;
    height: 220px;
    padding: 0.9rem;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.88rem;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .input-group textarea:focus { border-color: var(--accent); }
  .input-group textarea::placeholder { color: #4a4f5c; }

  /* Button */
  .check-btn {
    display: block;
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #7c5cf5);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 1.5rem;
  }
  .check-btn:hover { opacity: 0.9; }
  .check-btn:active { transform: scale(0.98); }
  .check-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Results */
  .result { display: none; }
  .result.show { display: block; }

  .score-circle {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.2rem;
    font-size: 1.6rem; font-weight: 800;
    border: 3px solid var(--border);
  }
  .score-high { color: var(--green); border-color: var(--green); }
  .score-mid { color: var(--orange); border-color: var(--orange); }
  .score-low { color: var(--red); border-color: var(--red); }

  .result-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 0.8rem;
  }
  .result-section h3 {
    font-size: 0.95rem;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .result-section h3 .icon { font-size: 1.1rem; }
  .keyword-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .tag {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.82rem;
    font-weight: 500;
  }
  .tag.hit { background: #1a3328; color: var(--green); border: 1px solid #23633c; }
  .tag.miss { background: #331a1f; color: var(--red); border: 1px solid #63233c; }

  .suggestion-list { list-style: none; }
  .suggestion-list li {
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .suggestion-list li:last-child { border-bottom: none; }
  .suggestion-list li::before { content: "💡 "; }

  .error-msg {
    background: #331a1f;
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 1rem;
    color: var(--red);
    font-size: 0.9rem;
    display: none;
  }
  .error-msg.show { display: block; }

  .loading {
    text-align: center;
    padding: 2rem;
    display: none;
  }
  .loading.show { display: block; }
  .loading .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 0.8rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer {
    text-align: center;
    margin-top: 2rem;
    color: var(--muted);
    font-size: 0.8rem;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    justify-content: center;
  }
  .mode-btn {
    padding: 0.5rem 1.2rem;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Photo upload */
  .photo-area {
    display: none;
  }
  .photo-area.show {
    display: contents;
  }
  .text-area.hide {
    display: none;
  }
  .upload-box {
    width: 100%;
    aspect-ratio: 3/4;
    max-height: 300px;
    border: 2px dashed var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--input-bg);
    position: relative;
    overflow: hidden;
  }
  .upload-box:hover { border-color: var(--accent); background: #1e2230; }
  .upload-box .icon { font-size: 2rem; margin-bottom: 0.3rem; }
  .upload-box .hint { color: var(--muted); font-size: 0.82rem; }
  .upload-box img.preview {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }
  .upload-box .clear-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 0.85rem;
    cursor: pointer;
    display: none;
    z-index: 2;
  }
  .upload-box.has-image .clear-btn { display: flex; align-items: center; justify-content: center; }
  .upload-box.has-image .icon,
  .upload-box.has-image .hint { display: none; }
  .extracted-text {
    margin-top: 0.5rem;
    font-size: 0.82rem;
    color: var(--muted);
    max-height: 100px;
    overflow-y: auto;
    display: none;
  }
  .extracted-text.show { display: block; }

  /* Polished tool surface */
  body {
    background:
      linear-gradient(180deg, #0b0f14 0%, #101318 48%, #0b0f14 100%);
  }
  .container { max-width: 980px; }
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    text-align: left;
    margin-bottom: 1rem;
  }
  .header h1 {
    font-size: 1.45rem;
    background: none;
    -webkit-text-fill-color: var(--text);
  }
  .header p { color: #9aa3af; }
  .activation-bar,
  .result-section {
    border-radius: 8px;
    background: #14181f;
    box-shadow: 0 12px 34px rgba(0,0,0,0.24);
  }
  .mode-toggle {
    background: #151a21;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.25rem;
  }
  .mode-btn {
    flex: 1;
    border-radius: 6px;
    border: none;
  }
  .mode-btn.active {
    background: #2f7d7b;
    box-shadow: 0 8px 18px rgba(47,125,123,0.26);
  }
  .check-btn {
    border-radius: 8px;
    background: #2f7d7b;
    box-shadow: 0 10px 24px rgba(47,125,123,0.22);
  }
  .secondary-btn {
    background: #202630;
    border: 1px solid var(--border);
    color: var(--text);
    box-shadow: none;
  }
  .button-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.2rem;
  }
  .step-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .step-item {
    border: 1px solid var(--border);
    background: #14181f;
    border-radius: 8px;
    padding: 0.75rem;
  }
  .step-item strong {
    display: block;
    font-size: 0.86rem;
    margin-bottom: 0.2rem;
  }
  .step-item span {
    color: var(--muted);
    font-size: 0.78rem;
  }
  .upload-box {
    border-radius: 8px;
    border-color: #303846;
    background: #171d25;
  }
  .upload-box img.preview {
    background: #11161c;
    padding: 0.35rem;
  }
  .extracted-text {
    color: #9aa3af;
    background: #121820;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.55rem 0.7rem;
  }
  .ocr-panel {
    display: none;
    margin-bottom: 1rem;
  }
  .ocr-panel.show { display: block; }
  .ocr-panel textarea {
    min-height: 180px;
    height: 180px;
  }
  .section-title {
    display: flex;
    justify-content: space-between;
    gap: 0.75rem;
    align-items: center;
    margin-bottom: 0.7rem;
  }
  .section-title h3 { margin: 0; }
  .tiny-btn {
    border: 1px solid var(--border);
    background: #202630;
    color: var(--text);
    border-radius: 6px;
    padding: 0.35rem 0.6rem;
    font-size: 0.78rem;
    cursor: pointer;
  }
  .score-circle {
    width: 96px;
    height: 96px;
    background: #14181f;
  }
  .multi-upload .upload-box {
    aspect-ratio: 16/10;
    max-height: 220px;
  }
  .photo-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
    gap: 0.55rem;
    margin-top: 0.65rem;
  }
  .photo-card {
    position: relative;
    min-height: 110px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: #11161c;
  }
  .photo-card img {
    width: 100%;
    height: 86px;
    object-fit: cover;
    display: block;
  }
  .photo-card small {
    display: block;
    padding: 0.35rem 0.45rem;
    color: var(--muted);
    font-size: 0.72rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .photo-card button {
    position: absolute;
    top: 5px;
    right: 5px;
    border: none;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    background: rgba(0,0,0,0.72);
    color: #fff;
    cursor: pointer;
  }
  .quality-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
    padding: 0.7rem 0.85rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #14181f;
    margin-bottom: 1rem;
  }
  .quality-row.hidden { display: none; }
  .quality-row span {
    color: var(--muted);
    font-size: 0.8rem;
  }
  .quality-row label {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.85rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .score-note {
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
    margin: -0.75rem 0 1rem;
  }
  .clean-note {
    display: none;
    color: #9aa3af;
    background: #121820;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 0.9rem;
    font-size: 0.85rem;
    margin-bottom: 0.8rem;
  }
  .clean-note.show { display: block; }
  @media (max-width: 640px) {
    .header { display: block; text-align: center; }
    .mode-toggle, .button-row, .step-strip { grid-template-columns: 1fr; }
    .button-row { gap: 0.6rem; }
    .photo-area.show { display: block; }
    .check-btn { margin-bottom: 0; }
    .activation-bar input,
    .activation-bar button { width: 100%; }
    .quality-row { display: block; }
    .quality-row label { margin-top: 0.5rem; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>📊 简历智能评分服务</h1>
    <p>AI 驱动 · ATS关键词匹配 · 精准定位简历短板</p>
  </div>

  <!-- Activation -->
  <div class="activation-bar">
    <span style="font-size:0.85rem;color:var(--muted);white-space:nowrap;">🔑 使用码</span>
    <input type="text" id="codeInput" placeholder="输入使用码激活工具" maxlength="30">
    <button onclick="verifyCode()">激活</button>
    <span class="status inactive" id="codeStatus">未激活</span>
    <a class="buy-link" href="https://mbd.pub" target="_blank" id="buyLink">💰 购买激活码 ¥9.9</a>
  </div>

  <!-- Main tool area -->
  <div id="toolArea" class="locked-overlay">
    <!-- Mode toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnTextMode" onclick="switchMode('text')">✏️ 文字输入</button>
      <button class="mode-btn" id="btnPhotoMode" onclick="switchMode('photo')">📷 拍照识别</button>
    </div>

    <!-- Text mode -->
    <div class="text-area" id="textArea">
      <div class="input-row">
        <div class="input-group">
          <label>📋 岗位描述 (JD)</label>
          <textarea id="jdInput" placeholder="粘贴岗位描述...&#10;&#10;例如：&#10;职位：高级前端工程师&#10;要求：精通 React/TypeScript，熟悉 Node.js，3年以上经验，有大型项目架构经验..."></textarea>
        </div>
        <div class="input-group">
          <label>📝 你的简历</label>
          <textarea id="resumeInput" placeholder="粘贴你的简历...&#10;&#10;例如：&#10;张三，5年前端开发经验，熟练掌握 React、Vue.js、JavaScript，参与过多个中大型项目开发..."></textarea>
        </div>
      </div>
      <button class="check-btn" id="checkBtn" onclick="checkResume()">📊 开始评分</button>
      <p class="score-note">评分前会自动忽略小说、聊天、广告等无关文字</p>
    </div>

    <!-- Photo mode -->
    <div class="photo-area" id="photoArea">
      <div class="step-strip">
        <div class="step-item">
          <strong>1. 上传图片</strong>
          <span>拍照或选择清晰截图</span>
        </div>
        <div class="step-item">
          <strong>2. OCR识别文字</strong>
          <span>保留换行和关键词</span>
        </div>
        <div class="step-item">
          <strong>3. 确认并评分</strong>
          <span>可先手动修正识别结果</span>
        </div>
      </div>
      <div class="input-row">
        <div class="input-group multi-upload">
          <label>📷 拍岗位描述</label>
          <label class="upload-box" for="jdFileInput">
            <span class="icon">📋</span>
            <span class="hint">可选择多张，优先上传关键页</span>
          </label>
          <input type="file" id="jdFileInput" accept="image/*" multiple style="display:none" onchange="handlePhoto('jd', this)">
          <div class="photo-list" id="jdPhotoList"></div>
          <div class="extracted-text" id="jdExtracted"></div>
        </div>
        <div class="input-group multi-upload">
          <label>📷 拍简历</label>
          <label class="upload-box" for="resumeFileInput">
            <span class="icon">📄</span>
            <span class="hint">长简历可分多页上传</span>
          </label>
          <input type="file" id="resumeFileInput" accept="image/*" multiple style="display:none" onchange="handlePhoto('resume', this)">
          <div class="photo-list" id="resumePhotoList"></div>
          <div class="extracted-text" id="resumeExtracted"></div>
        </div>
      </div>
      <div class="quality-row hidden">
        <span>默认使用开源 OCR，不消耗图片识别 token。</span>
        <label><input type="checkbox" id="qualityToggle"> 增强识别</label>
      </div>
      <div class="ocr-panel" id="ocrPanel">
        <div class="input-row">
          <div class="input-group">
            <label>识别出的岗位描述（可修改）</label>
            <textarea id="jdOcrText" placeholder="点击 OCR识别文字 后自动填入..."></textarea>
          </div>
          <div class="input-group">
            <label>识别出的简历内容（可修改）</label>
            <textarea id="resumeOcrText" placeholder="点击 OCR识别文字 后自动填入..."></textarea>
          </div>
        </div>
      </div>
      <div class="button-row">
        <button class="check-btn secondary-btn" id="ocrBtn" onclick="ocrPhoto()">🔍 OCR识别文字</button>
        <button class="check-btn" id="photoCheckBtn" onclick="checkPhoto()">📊 确认并评分</button>
      </div>
      <p class="score-note">评分前会自动忽略小说、聊天、广告等无关文字</p>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="color:var(--muted)">AI 正在评估简历匹配度...</p>
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Results -->
    <div class="result" id="result">
      <div class="clean-note" id="cleanNote"></div>
      <div class="score-circle" id="scoreCircle">--</div>

      <div class="result-section">
        <h3><span class="icon">✅</span>关键能力匹配</h3>
        <div class="keyword-tags" id="matchedTags"></div>
      </div>

      <div class="result-section">
        <h3><span class="icon">❌</span>能力缺口</h3>
        <div class="keyword-tags" id="missingTags"></div>
      </div>

      <div class="result-section">
        <div class="section-title">
          <h3><span class="icon">✨</span>优化后简历</h3>
          <button class="tiny-btn" onclick="copyOptimized()">复制</button>
        </div>
        <div id="optimizedResume" style="background:var(--input-bg);padding:1rem;border-radius:8px;font-size:0.88rem;line-height:1.7;white-space:pre-wrap;"></div>
      </div>

      <div class="result-section">
        <h3><span class="icon">📝</span>优化建议</h3>
        <ul class="suggestion-list" id="suggestions"></ul>
      </div>
    </div>
  </div>

  <div class="footer">
    隐私安全 · 数据不落盘 · 分析即焚 · AI 驱动评分
  </div>
</div>

<script>
// file:// → localhost:5000; served by same server → relative; otherwise → Render
const API_BASE = (window.location.protocol === 'file:')
  ? 'http://localhost:5000'
  : '';  // same origin when deployed

let activated = false;

// Try saved code from localStorage
const savedCode = localStorage.getItem('resume_check_code');
if (savedCode) {
  document.getElementById('codeInput').value = savedCode;
  verifyCode();
}

async function verifyCode() {
  const code = document.getElementById('codeInput').value.trim();
  const status = document.getElementById('codeStatus');
  const toolArea = document.getElementById('toolArea');

  if (!code) {
    status.textContent = '请输入使用码';
    status.className = 'status inactive';
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/api/verify-code`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code })
    });
    const data = await res.json();

    if (data.valid) {
      activated = true;
      status.textContent = '✅ 已激活';
      status.className = 'status active';
      toolArea.className = 'unlocked';
      localStorage.setItem('resume_check_code', code);
    } else {
      activated = false;
      status.textContent = '❌ ' + (data.error || '无效使用码');
      status.className = 'status inactive';
      toolArea.className = 'locked-overlay';
    }
  } catch (e) {
    status.textContent = '⚠️ 网络错误，请重试';
    status.className = 'status inactive';
  }
}

async function checkResume() {
  if (!activated) {
    alert('请先输入使用码激活工具');
    return;
  }

  const jd = document.getElementById('jdInput').value.trim();
  const resume = document.getElementById('resumeInput').value.trim();

  if (!jd || !resume) {
    showError('请同时填写岗位描述和简历内容');
    return;
  }
  if (jd.length < 20) {
    showError('岗位描述太短，请至少输入20个字');
    return;
  }
  if (resume.length < 30) {
    showError('简历内容太短，请至少输入30个字');
    return;
  }

  hideError();
  document.getElementById('result').classList.remove('show');
  document.getElementById('loading').classList.add('show');
  document.getElementById('checkBtn').disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/check`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jd, resume })
    });
    const data = await res.json();

    if (data.error) {
      showError(data.error);
      return;
    }

    renderResult(data);
  } catch (e) {
    showError('网络错误或服务暂不可用，请稍后重试');
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('checkBtn').disabled = false;
  }
}

function renderResult(data) {
  const cleanNote = document.getElementById('cleanNote');
  if (data.resume_original_length && data.resume_cleaned_length && data.resume_cleaned_length < data.resume_original_length) {
    cleanNote.textContent = `已自动过滤无关文字：${data.resume_original_length} → ${data.resume_cleaned_length} 字`;
    cleanNote.classList.add('show');
  } else {
    cleanNote.classList.remove('show');
  }

  // Score
  const score = data.score || 0;
  const circle = document.getElementById('scoreCircle');
  circle.textContent = score;
  circle.className = 'score-circle';
  if (score >= 70) circle.className += ' score-high';
  else if (score >= 40) circle.className += ' score-mid';
  else circle.className += ' score-low';

  // Matched
  const matchedDiv = document.getElementById('matchedTags');
  matchedDiv.innerHTML = (data.matched || []).map(k =>
    `<span class="tag hit">${escapeHtml(k)}</span>`
  ).join('') || '<span style="color:var(--muted)">未检测到匹配关键词</span>';

  // Missing
  const missingDiv = document.getElementById('missingTags');
  missingDiv.innerHTML = (data.missing || []).map(k =>
    `<span class="tag miss">${escapeHtml(k)}</span>`
  ).join('') || '<span style="color:var(--muted)">未检测到缺失关键词</span>';

  // Optimized resume
  const optDiv = document.getElementById('optimizedResume');
  if (data.optimized) {
    optDiv.textContent = data.optimized;
    optDiv.style.display = '';
  } else {
    optDiv.style.display = 'none';
  }

  // Suggestions
  const sugList = document.getElementById('suggestions');
  sugList.innerHTML = (data.suggestions || []).map(s =>
    `<li>${escapeHtml(s)}</li>`
  ).join('') || '<li style="color:var(--muted)">暂无建议</li>';

  document.getElementById('result').classList.add('show');
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
}

async function copyOptimized() {
  const text = document.getElementById('optimizedResume').textContent.trim();
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    showError('优化后简历已复制');
    setTimeout(hideError, 1200);
  } catch (e) {
    showError('复制失败，请手动选择文本复制');
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Photo mode: client compresses, server reads images ──
var currentMode = 'text';
var photoData = { jd: [], resume: [] };
var ocrTexts = { jd: '', resume: '' };
var pageTexts = { jd: [], resume: [] };

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('btnTextMode').className = mode === 'text' ? 'mode-btn active' : 'mode-btn';
  document.getElementById('btnPhotoMode').className = mode === 'photo' ? 'mode-btn active' : 'mode-btn';
  document.getElementById('textArea').className = mode === 'photo' ? 'text-area hide' : 'text-area';
  document.getElementById('photoArea').className = mode === 'photo' ? 'photo-area show' : 'photo-area';
  document.getElementById('result').classList.remove('show');
  hideError();
}

function compressImage(file, maxSide = 2200, quality = 0.92) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onerror = reject;
    img.onload = () => {
      let { width, height } = img;
      const scale = Math.min(1, maxSide / Math.max(width, height));
      width = Math.round(width * scale);
      height = Math.round(height * scale);

      if (scale === 1 && file.size < 5 * 1024 * 1024) {
        if (!img.src || !img.src.includes(',')) {
          reject(new Error('empty image data'));
          return;
        }
        resolve({
          dataUrl: img.src,
          base64: img.src.split(',')[1],
        });
        return;
      }

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      const base64 = dataUrl.split(',')[1] || '';
      if (!base64) {
        reject(new Error('empty canvas data'));
        return;
      }
      resolve({
        dataUrl,
        base64,
      });
    };
    reader.readAsDataURL(file);
  });
}

async function handlePhoto(type, input) {
  const files = Array.from(input.files || []);
  if (!files.length) return;

  if (files.some(file => file.size > 12 * 1024 * 1024)) {
    showError('单张图片不能超过 12MB');
    return;
  }

  const statusEl = document.getElementById(type === 'jd' ? 'jdExtracted' : 'resumeExtracted');
  statusEl.textContent = '正在处理图片...';
  statusEl.classList.add('show');

  try {
    const compressedFiles = await Promise.all(files.map(compressImage));
    const validFiles = compressedFiles.filter(item => item.base64 && item.base64.length > 100);
    if (!validFiles.length) {
      throw new Error('no valid images');
    }
    photoData[type].push(...validFiles.map(item => ({
      base64: item.base64,
      dataUrl: item.dataUrl,
      chars: null,
    })));
    renderPhotoList(type);
    statusEl.textContent = `已选择 ${photoData[type].length} 张图片，下一步：点击下方“OCR识别文字”`;
    ocrTexts[type] = '';
    pageTexts[type] = [];
    document.getElementById(type === 'jd' ? 'jdOcrText' : 'resumeOcrText').value = '';
  } catch (e) {
    statusEl.textContent = '图片处理失败，请换 JPG/PNG 截图或重新拍照';
  }
  input.value = '';
}

function renderPhotoList(type) {
  const list = document.getElementById(type === 'jd' ? 'jdPhotoList' : 'resumePhotoList');
  list.innerHTML = photoData[type].map((photo, idx) => {
    const chars = photo.chars == null ? '待识别' : `${photo.chars}字`;
    return `
      <div class="photo-card">
        <img src="${photo.dataUrl}" alt="">
        <button onclick="removePhoto('${type}', ${idx})">×</button>
        <small>第${idx + 1}张 · ${chars}</small>
      </div>
    `;
  }).join('');
  updatePhotoButtons();
}

function removePhoto(type, idx) {
  photoData[type].splice(idx, 1);
  pageTexts[type].splice(idx, 1);
  renderPhotoList(type);
  const statusEl = document.getElementById(type === 'jd' ? 'jdExtracted' : 'resumeExtracted');
  statusEl.textContent = photoData[type].length
    ? `已选择 ${photoData[type].length} 张图片`
    : '未选择图片';
  statusEl.classList.add('show');
  document.getElementById(type === 'jd' ? 'jdOcrText' : 'resumeOcrText').value = pageTexts[type].join('\n\n');
  updatePhotoButtons();
}

function clearPhoto(type) {
  photoData[type] = [];
  ocrTexts[type] = '';
  pageTexts[type] = [];
  renderPhotoList(type);
  document.getElementById(type === 'jd' ? 'jdExtracted' : 'resumeExtracted').classList.remove('show');
  document.getElementById(type === 'jd' ? 'jdOcrText' : 'resumeOcrText').value = '';
  const fileInput = document.getElementById(type === 'jd' ? 'jdFileInput' : 'resumeFileInput');
  fileInput.value = '';
  updatePhotoButtons();
}

function updatePhotoButtons() {
  const hasBoth = photoData.jd.length > 0 && photoData.resume.length > 0;
  const ocrBtn = document.getElementById('ocrBtn');
  const photoBtn = document.getElementById('photoCheckBtn');
  if (ocrBtn) ocrBtn.disabled = !hasBoth;
  if (photoBtn) photoBtn.disabled = !document.getElementById('jdOcrText').value.trim() || !document.getElementById('resumeOcrText').value.trim();
}

async function ocrPhoto() {
  if (!activated) { alert('请先输入使用码激活工具'); return; }

  if (!photoData.jd.length || !photoData.resume.length) {
    showError('图片没有正确载入。请删除空白缩略图，重新上传 JPG/PNG 岗位描述和简历照片');
    return;
  }

  hideError();
  document.getElementById('result').classList.remove('show');
  document.getElementById('loading').classList.add('show');
  document.querySelector('#loading p').textContent = 'OCR 正在识别图片文字...';
  const ocrBtn = document.getElementById('ocrBtn');
  const originalText = ocrBtn.textContent;
  ocrBtn.disabled = true;
  ocrBtn.textContent = '识别中...';

  try {
    const quality = document.getElementById('qualityToggle').checked ? 'high' : 'standard';
    const res = await fetch(`${API_BASE}/api/ocr-photo`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jd_images: photoData.jd.map(item => item.base64),
        resume_images: photoData.resume.map(item => item.base64),
        quality
      })
    });
    const data = await res.json();

    if (data.error) {
      showError(data.error);
      return;
    }

    ocrTexts.jd = data.jd_text || '';
    ocrTexts.resume = data.resume_text || '';
    pageTexts.jd = data.jd_pages || [];
    pageTexts.resume = data.resume_pages || [];
    photoData.jd.forEach((photo, idx) => { photo.chars = (pageTexts.jd[idx] || '').length; });
    photoData.resume.forEach((photo, idx) => { photo.chars = (pageTexts.resume[idx] || '').length; });
    renderPhotoList('jd');
    renderPhotoList('resume');
    document.getElementById('jdOcrText').value = ocrTexts.jd;
    document.getElementById('resumeOcrText').value = ocrTexts.resume;
    document.getElementById('ocrPanel').classList.add('show');
    const lowHint = (ocrTexts.jd.length < 80 || ocrTexts.resume.length < 120)
      ? '。识别字数偏少，可重拍或开启增强识别'
      : '';
    document.getElementById('jdExtracted').textContent = `共识别 ${ocrTexts.jd.length} 个字，可在下方修改${lowHint}`;
    document.getElementById('resumeExtracted').textContent = `共识别 ${ocrTexts.resume.length} 个字，可在下方修改${lowHint}`;
    document.getElementById('jdExtracted').classList.add('show');
    document.getElementById('resumeExtracted').classList.add('show');
    updatePhotoButtons();
  } catch (e) {
    showError('拍照识别失败，请确认图片清晰，或稍后重试');
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.querySelector('#loading p').textContent = 'AI 正在评估简历匹配度...';
    ocrBtn.disabled = false;
    ocrBtn.textContent = originalText;
  }
}

async function checkPhoto() {
  if (!activated) { alert('请先输入使用码激活工具'); return; }

  const jd = document.getElementById('jdOcrText').value.trim();
  const resume = document.getElementById('resumeOcrText').value.trim();

  if (!jd || !resume) {
    showError('请先点击“OCR识别文字”，或在下方手动补充识别文本');
    return;
  }
  if (jd.length < 20) {
    showError('岗位描述文字太短，请修正识别结果或换一张更清晰的图片');
    return;
  }
  if (resume.length < 30) {
    showError('简历文字太短，请修正识别结果或换一张更清晰的图片');
    return;
  }

  hideError();
  document.getElementById('result').classList.remove('show');
  document.getElementById('loading').classList.add('show');
  document.querySelector('#loading p').textContent = 'AI 正在评估简历匹配度...';
  const photoBtn = document.getElementById('photoCheckBtn');
  const originalText = photoBtn.textContent;
  photoBtn.disabled = true;
  photoBtn.textContent = '评分中...';

  try {
    const res = await fetch(`${API_BASE}/api/check`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jd, resume })
    });
    const data = await res.json();

    if (data.error) {
      showError(data.error);
      return;
    }

    renderResult(data);
  } catch (e) {
    showError('评分失败，请稍后重试');
  } finally {
    document.getElementById('loading').classList.remove('show');
    photoBtn.disabled = false;
    photoBtn.textContent = originalText;
  }
}

document.getElementById('jdOcrText').addEventListener('input', updatePhotoButtons);
document.getElementById('resumeOcrText').addEventListener('input', updatePhotoButtons);
updatePhotoButtons();

// Enter key triggers check
document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') verifyCode();
});
</script>
