services:
  - type: web
    name: resume-checker-api
    runtime: python
    rootDir: resume-checker/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VISION_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_VISION_MODEL_HIGH
        value: gpt-4.1
